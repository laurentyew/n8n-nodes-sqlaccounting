name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install all dependencies (no scripts, no peer deps)
        # ignore-scripts prevents isolated-vm C++ compilation
        # npm install resolves devDependencies only (peerDeps marked optional)
        # We then add n8n-workflow types separately so tsc can compile
        run: |
          npm install --ignore-scripts --no-optional
          npm install n8n-workflow --ignore-scripts

      - name: Build
        run: npm run build

      - name: Run linter
        run: npm run lint

      - name: Run n8n community package scanner
        run: npx @n8n/scan-community-package ./

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
