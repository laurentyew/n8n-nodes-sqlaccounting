name: Publish to npm

on:
  push:
    tags:
      - 'v*'    # Triggers on v1.0.0, v1.0.1, etc.
      # To publish: git tag v1.0.0 && git push origin v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # REQUIRED for npm provenance (mandatory from May 2026)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'           # n8n CLI requires Node 18 or 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run linter
        run: npm run lint

      - name: Run n8n community package scanner
        run: npx @n8n/scan-community-package ./dist
        # This is the same check n8n runs when you submit for verification.
        # If this fails here it will fail at submission — fix it now.

      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Add NPM_TOKEN to GitHub repo: Settings → Secrets → Actions → New secret
